# ==========================================
# LLaMA-Factory: Qwen3-VL-2B-Instruct LoRA 微调 (v2: 15 类)
# 目标硬件: AutoDL RTX 4090 48GB（实测）/ vGPU-32GB（备选）
# 训练数据: datasets/industrial_vision_train.json (15 类，~1200 条)
# ==========================================

### 模型 (Model)
model_name_or_path: models/qwen3vl_models/base/
trust_remote_code: true

### 数据集 (Dataset)
dataset_dir: datasets/
dataset: industrial_vision_train
template: qwen3_vl
cutoff_len: 4096               # 实测单样本 ~156 tokens，4096 足够
max_samples: 2000              # v2: 15 类 ~1200 条，留余量
overwrite_cache: true
preprocessing_num_workers: 4

### 微调策略 (LoRA)
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,v_proj,k_proj,o_proj
lora_rank: 32
lora_alpha: 32
lora_dropout: 0.05
freeze_vision_tower: true           # 1200 样本不足以微调 ViT
freeze_multi_modal_projector: true  # 同上，只训练 LoRA adapter

### 训练超参数 (Hyperparameters)
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
gradient_checkpointing: false  # 48GB 显存无需开启，关闭提升训练速度
bf16: true
fp16: false

### 输出 (Output)
output_dir: models/qwen3vl_lora_adapter_15cls/  # v2: 15 类 adapter，不覆盖 v1
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true
