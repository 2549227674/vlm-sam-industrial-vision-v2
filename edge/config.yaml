# ── 设备标识 ──────────────────────────────────────
device_id: rk3588-line-A-cam01
line_id: "L1"                    # 上报到后端的 line_id 字段，max 32 字符

# ── 后端连接 ──────────────────────────────────────
backend_url: http://192.168.1.100:8000
upload_timeout_s: 30
upload_max_retries: 5            # 指数退避最多 5 次（500ms × 2ⁿ + jitter）

# ── AB 测试 ───────────────────────────────────────
vlm_variant: "base"              # "base"=Base+Prompt工程 / "lora"=LoRA+极简Prompt
vlm_model_size: "4B"             # "2B" | "4B"，切换后需重启进程

# ── 取帧模式 ──────────────────────────────────────
capture_mode: image_loop         # "v4l2" | "image_loop"

# V4L2 模式（板子接摄像头时用）
camera_device: /dev/video0
camera_width: 1920
camera_height: 1080

# Image Loop 模式（静态图片集循环测试用）
image_loop_dir: /home/ubuntu/datasets/MVTec
image_loop_categories:           # T1 循环读取的类别列表
  - metal_nut
  - screw
  - pill
image_loop_beat_ms: 1500         # 每帧间隔，毫秒
image_loop_jitter_ms: 200        # ± 抖动

# ── Stage 1：EfficientAD-S ───────────────────────
efficientad_model_dir: /TBD/models/efficientad_models
efficientad_threshold: 0.5       # 异常分数超过此值触发 Stage 2/3（等同 efficientad_threshold_default）
efficientad_input_size: 256      # 固定 256×256，不要改

# ── Stage 1：类别级自适应阈值 ─────────────────────
# 默认阈值：anomaly_score > 0.50 时触发 FastSAM + VLM
efficientad_threshold_default: 0.50
# 类别级自适应阈值（覆盖默认值）
# capsule: image_AUROC=0.70，定位能力尚可但整图排序弱，降低阈值提高召回
# 其余类别未配置则使用 default
per_category_threshold:
  capsule: 0.30      # 系统性弱点类别，高召回策略
  # transistor: 0.50  # 40ep 后 AUROC=0.90，使用默认值
  # toothbrush: 0.50  # 40ep 后 AUROC=0.91，使用默认值
# TODO(Phase 7)：C++ T2 Pipeline 需要读取 per_category_threshold，
# 按当前帧 category 查表，找不到则 fallback 到 efficientad_threshold_default。
# 当前 edge/config.yaml 已预置配置，等 C++ 实现后直接读取即可。

# ── Stage 2：FastSAM ──────────────────────────────
fastsam_model_path: /TBD/models/fastsam_models/fastsam_s.rknn
fastsam_input_size: 640          # 固定 640，见 ARCHITECTURE.md §3.2
fastsam_conf: 0.5

# ── Stage 3：Qwen3-VL-2B/4B ──────────────────────
vlm_model_path: /TBD/models/qwen3vl_models/qwen3vl_2b_w8a8.rkllm
vlm_vision_model_path: /TBD/models/qwen3vl_models/qwen3vl_vision.rknn
vlm_4b_model_path: /TBD/models/qwen3vl_models/qwen3vl_4b_w8a8_base.rkllm
vlm_4b_vision_model_path: /TBD/models/qwen3vl_models/qwen3vl_4b_vision_v122.rknn
# 4B 运行时 RAM ~8.7 GB，Pipeline 总峰值 ~11.4 GB（16GB 板裕度 ~3.1 GB）
# 4B 文件来源：Qengineering Sync.com（不自行转换 base 文件）
# 视觉文件：使用 v1.2.2 版本（v1.2.3 精度存在回退，见 Issue #421）
vlm_max_new_tokens: 200
vlm_max_context: 4096            # 16GB 板约束，上限 4096
vlm_npu_core_num: 3              # 三核并行

# ── 图片落盘 ──────────────────────────────────────
jpeg_quality: 85                 # 上报图片压缩质量